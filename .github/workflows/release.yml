name: release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # - name: Import code signing certificate
      #   env:
      #     MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      #     MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      #     KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      #   run: |
      #     chmod +x scripts/ci-import-signing-cert.sh
      #     ./scripts/ci-import-signing-cert.sh

      - name: Build + dist (app + DMG)
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/build-dmg.sh
          ./scripts/build-dmg.sh

      # - name: Notarize DMG
      #   env:
      #     APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      #     APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      #     APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      #   run: |
      #     chmod +x scripts/notarize-dmg.sh
      #     ./scripts/notarize-dmg.sh

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent dist/WorkPane.app "dist/WorkPane-${{ github.ref_name }}.zip"

      - uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/WorkPane-*.dmg,dist/WorkPane-*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
